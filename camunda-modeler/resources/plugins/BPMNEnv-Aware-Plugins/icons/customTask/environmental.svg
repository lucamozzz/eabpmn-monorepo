<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50">
  <!-- Sphere outline -->
  <circle cx="25" cy="25" r="18"
          fill="transparent"
          stroke="black"
          stroke-width="2"/>
  <!-- Equator -->
  <line x1="7" y1="25" x2="43" y2="25"
        stroke="black"
        stroke-width="2"/>
  <!-- Front meridian (ellipse for globe curvature) -->
  <ellipse cx="25" cy="25" rx="8" ry="18"
          fill="transparent"
          stroke="black"
          stroke-width="2"/>
</svg>
