<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BEE Mobile App</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #13223a;
      --muted: #536277;
      --accent: #0f6cbd;
      --accent-2: #0a4f8a;
      --ok-bg: #e7f7ee;
      --ok-text: #0f6d3e;
      --err-bg: #fdebec;
      --err-text: #8e1e22;
      --border: #dce3ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .shell {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(17, 24, 39, 0.06);
    }

    .brand-title {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      box-shadow: 0 4px 14px rgba(15, 108, 189, 0.18);
    }

    .title {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(17, 24, 39, 0.06);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-header h2 {
      margin: 0;
    }

    .collapse-toggle {
      width: auto;
      padding: 6px 10px;
      font-size: 0.82rem;
      border-radius: 999px;
    }

    .collapsible-body.hidden {
      display: none;
    }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 700px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 0.96rem;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86rem;
    }

    button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    @media (min-width: 520px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.83rem;
    }

    .status {
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.88rem;
      display: none;
    }

    .status.ok {
      display: block;
      background: var(--ok-bg);
      color: var(--ok-text);
      border: 1px solid #c9edd8;
    }

    .status.err {
      display: block;
      background: var(--err-bg);
      color: var(--err-text);
      border: 1px solid #f7c7ca;
    }

    .small {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .actions-list {
      margin: 0;
      padding-left: 0;
      color: var(--text);
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .actions-list li {
      margin: 0;
      line-height: 1.3;
      border: 1px solid #f2d39a;
      background: linear-gradient(180deg, #fff8ea 0%, #fff2d6 100%);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(185, 122, 0, 0.08);
    }

    .action-name {
      display: block;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #7a3d00;
      margin-bottom: 4px;
    }

    .action-meta {
      font-size: 0.82rem;
      color: #80531d;
    }

    .action-empty {
      color: var(--muted);
      padding: 10px 2px;
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <img class="brand-logo" src="/BEE.png" alt="BEE logo" />
      <h1 class="brand-title">BEE Mobile App</h1>
    </div>
    <button id="connectionToggleBtn" class="icon-btn" type="button" title="Connection Settings" aria-expanded="false">⚙</button>
  </div>

  <section class="card" id="connectionCard" style="display:none;">
    <div class="card-header">
      <h2>Connection</h2>
      <button id="connectionCollapseBtn" class="secondary collapse-toggle" type="button">Hide</button>
    </div>
    <div id="connectionBody" class="collapsible-body">
      <div class="grid two">
        <div>
          <label for="baseUrl">Engine Base URL</label>
          <input id="baseUrl" type="text" placeholder="http://localhost:8082" />
        </div>
        <div>
          <label for="participantSelect">Participant</label>
          <select id="participantSelect"></select>
        </div>
      </div>
      <div class="row two" style="margin-top: 10px;">
        <button class="secondary" id="refreshParticipantsBtn">Refresh Participants</button>
        <button class="secondary" id="loadCurrentPosBtn">Load Current Position</button>
      </div>
      <!-- <div class="hint">On mobile, use your PC LAN IP (example: <span class="small">http://192.168.1.20:8082</span>).</div> -->
    </div>
  </section>

  <section class="card">
    <h2>Pending Actions For Participant</h2>
    <div class="small">Shows actions that need immediate attention for the selected participant.</div>
    <ul id="pendingActionsList" class="actions-list" style="margin-top:10px;"></ul>
  </section>

  <section class="card">
    <h2>Update Participant Position</h2>
    <div class="grid two">
      <div>
        <label for="positionInput">Position by place id</label>
        <input id="positionInput" type="text" placeholder="place2" />
      </div>
      <div style="display:flex; align-items:end;">
        <button id="setPositionBtn">Set Position</button>
      </div>
    </div>

    <div class="row two" style="margin-top: 10px;">
      <div>
        <label for="latInput">Latitude</label>
        <input id="latInput" type="number" step="0.000001" placeholder="43.13909" />
      </div>
      <div>
        <label for="lonInput">Longitude</label>
        <input id="lonInput" type="number" step="0.000001" placeholder="13.06778" />
      </div>
    </div>
    <div class="row two" style="margin-top: 10px;">
      <button class="secondary" id="useGpsBtn">Use Phone GPS</button>
      <button id="setCoordBtn">Set Position From Coordinates</button>
    </div>
  </section>

  <section class="card">
    <h2>Update Place Attribute</h2>
    <div class="row two">
      <div>
        <label for="placeIdInput">Place id</label>
        <input id="placeIdInput" type="text" placeholder="place2" />
      </div>
      <div>
        <label for="attrKeyInput">Attribute key</label>
        <input id="attrKeyInput" type="text" placeholder="light" />
      </div>
    </div>

    <div class="row two" style="margin-top: 10px;">
      <div>
        <label for="attrTypeSelect">Value type</label>
        <select id="attrTypeSelect">
          <option value="string">string</option>
          <option value="number">number</option>
          <option value="boolean">boolean</option>
          <option value="null">null</option>
        </select>
      </div>
      <div>
        <label for="attrValueInput">Value</label>
        <input id="attrValueInput" type="text" placeholder="on" />
      </div>
    </div>
    <div style="margin-top: 10px;">
      <button id="setAttrBtn">Set Attribute</button>
    </div>
  </section>
</div>

<script>
  const connectionCard = document.getElementById("connectionCard");
  const connectionBody = document.getElementById("connectionBody");
  const connectionToggleBtn = document.getElementById("connectionToggleBtn");
  const connectionCollapseBtn = document.getElementById("connectionCollapseBtn");
  const baseUrlEl = document.getElementById("baseUrl");
  const participantSelect = document.getElementById("participantSelect");
  const positionInput = document.getElementById("positionInput");
  const latInput = document.getElementById("latInput");
  const lonInput = document.getElementById("lonInput");
  const placeIdInput = document.getElementById("placeIdInput");
  const attrKeyInput = document.getElementById("attrKeyInput");
  const attrTypeSelect = document.getElementById("attrTypeSelect");
  const attrValueInput = document.getElementById("attrValueInput");
  const pendingActionsList = document.getElementById("pendingActionsList");
  const resultBox = document.getElementById("resultBox");
  const statusBox = document.getElementById("statusBox");

  function setConnectionVisible(visible) {
    connectionCard.style.display = visible ? "block" : "none";
    connectionToggleBtn.setAttribute("aria-expanded", visible ? "true" : "false");
  }

  function setConnectionCollapsed(collapsed) {
    connectionBody.classList.toggle("hidden", collapsed);
    connectionCollapseBtn.textContent = collapsed ? "Show" : "Hide";
  }

  function defaultBaseUrl() {
    if (window.location.protocol.startsWith("http")) {
      return window.location.origin;
    }
    return "http://localhost:8082";
  }

  baseUrlEl.value = defaultBaseUrl();

  function getBaseUrl() {
    return (baseUrlEl.value || "").trim().replace(/\/$/, "");
  }

  function setStatusOk(message) {
    statusBox.className = "status ok";
    statusBox.textContent = message;
  }

  function setStatusErr(message) {
    statusBox.className = "status err";
    statusBox.textContent = message;
  }

  function showResult(data) {
    resultBox.value = typeof data === "string" ? data : JSON.stringify(data, null, 2);
  }

  async function apiCall(method, path, body) {
    const url = getBaseUrl() + path;
    const opts = {
      method,
      headers: { "Content-Type": "application/json" }
    };

    if (body !== undefined) {
      opts.body = JSON.stringify(body);
    }

    const response = await fetch(url, opts);
    const json = await response.json().catch(() => ({}));

    if (!response.ok) {
      const msg = json && json.message ? json.message : ("HTTP " + response.status);
      throw new Error(msg);
    }

    return json;
  }

  async function refreshParticipants() {
    try {
      const res = await apiCall("GET", "/api/environment/participants");
      const participants = (res && res.data) || [];

      participantSelect.innerHTML = "";
      for (const p of participants) {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.id + (p.position ? (" (" + p.position + ")") : " (null)");
        participantSelect.appendChild(opt);
      }

      if (!participants.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No participants found";
        participantSelect.appendChild(opt);
      }

      showResult(res);
      setStatusOk("Participants loaded.");
      await refreshPendingActions();
    } catch (err) {
      setStatusErr("Failed to load participants: " + err.message);
    }
  }

  async function refreshPendingActions() {
    const participantId = participantSelect.value;
    pendingActionsList.innerHTML = "";

    if (!participantId) {
      const li = document.createElement("li");
      li.className = "action-empty";
      li.textContent = "Select a participant first.";
      pendingActionsList.appendChild(li);
      return;
    }

    try {
      const res = await apiCall("GET", "/api/environment/participants/" + encodeURIComponent(participantId) + "/actions/pending");
      const actions = (res && res.data) || [];

      if (!actions.length) {
        const li = document.createElement("li");
        li.className = "action-empty";
        li.textContent = "No pending actions.";
        pendingActionsList.appendChild(li);
        return;
      }

      for (const action of actions) {
        const li = document.createElement("li");
        const actionName = action.message || ("Esegui azione: " + (action.action || "unknown"));
        const activity = action.activityId ? ("Activity: " + action.activityId) : "";
        li.innerHTML =
          '<span class="action-name">' + actionName + '</span>' +
          (activity ? '<span class="action-meta">' + activity + '</span>' : '');
        pendingActionsList.appendChild(li);
      }

      showResult(res);
      setStatusOk("Pending actions loaded.");
    } catch (err) {
      // const li = document.createElement("li");
      // li.className = "action-empty";
      // li.textContent = "Error loading actions: " + err.message;
      // pendingActionsList.appendChild(li);
      // setStatusErr("Failed to load pending actions: " + err.message);
    }
  }

  async function loadCurrentPosition() {
    const participantId = participantSelect.value;
    if (!participantId) {
      setStatusErr("Select a participant first.");
      return;
    }

    try {
      const res = await apiCall("GET", "/api/environment/participants/" + encodeURIComponent(participantId) + "/position");
      positionInput.value = (res && res.data) || "";
      showResult(res);
      setStatusOk("Current position loaded.");
    } catch (err) {
      setStatusErr("Failed to read current position: " + err.message);
    }
  }

  async function setPositionById() {
    const participantId = participantSelect.value;
    const newPosition = (positionInput.value || "").trim();

    if (!participantId) {
      setStatusErr("Select a participant first.");
      return;
    }
    if (!newPosition) {
      setStatusErr("Position is required.");
      return;
    }

    try {
      const res = await apiCall(
        "PUT",
        "/api/environment/participants/" + encodeURIComponent(participantId) + "/position",
        { position: newPosition }
      );
      showResult(res);
      setStatusOk("Participant position updated.");
      await refreshParticipants();
    } catch (err) {
      setStatusErr("Failed to set position: " + err.message);
    }
  }

  async function setPositionByCoordinates() {
    const participantId = participantSelect.value;
    const latitude = Number(latInput.value);
    const longitude = Number(lonInput.value);

    if (!participantId) {
      setStatusErr("Select a participant first.");
      return;
    }
    if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
      setStatusErr("Latitude and longitude must be valid numbers.");
      return;
    }

    try {
      const res = await apiCall(
        "PUT",
        "/api/environment/participants/" + encodeURIComponent(participantId) + "/position/coordinates",
        { latitude, longitude }
      );
      showResult(res);
      setStatusOk("Participant position resolved from coordinates.");
      await refreshParticipants();
    } catch (err) {
      setStatusErr("Failed to set position from coordinates: " + err.message);
    }
  }

  function usePhoneGps() {
    if (!navigator.geolocation) {
      setStatusErr("Geolocation is not supported by this browser.");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        latInput.value = pos.coords.latitude.toFixed(6);
        lonInput.value = pos.coords.longitude.toFixed(6);
        setStatusOk("GPS coordinates loaded from device.");
      },
      (err) => {
        setStatusErr("Failed to get device location: " + err.message);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 10000 }
    );
  }

  function parseTypedValue(type, raw) {
    if (type === "null") {
      return null;
    }
    if (type === "number") {
      const n = Number(raw);
      if (!Number.isFinite(n)) {
        throw new Error("Value must be a valid number.");
      }
      return n;
    }
    if (type === "boolean") {
      const v = (raw || "").trim().toLowerCase();
      if (v === "true") return true;
      if (v === "false") return false;
      throw new Error("Boolean value must be 'true' or 'false'.");
    }
    return raw;
  }

  async function setAttribute() {
    const placeId = (placeIdInput.value || "").trim();
    const attrKey = (attrKeyInput.value || "").trim();
    const attrType = attrTypeSelect.value;
    const rawValue = attrValueInput.value;

    if (!placeId || !attrKey) {
      setStatusErr("Place id and attribute key are required.");
      return;
    }

    try {
      const value = parseTypedValue(attrType, rawValue);
      const res = await apiCall(
        "PUT",
        "/api/environment/pps/" + encodeURIComponent(placeId) + "/attributes/" + encodeURIComponent(attrKey),
        { value }
      );
      showResult(res);
      setStatusOk("Attribute updated.");
    } catch (err) {
      setStatusErr("Failed to set attribute: " + err.message);
    }
  }

  document.getElementById("refreshParticipantsBtn").addEventListener("click", refreshParticipants);
  document.getElementById("loadCurrentPosBtn").addEventListener("click", loadCurrentPosition);
  document.getElementById("setPositionBtn").addEventListener("click", setPositionById);
  document.getElementById("setCoordBtn").addEventListener("click", setPositionByCoordinates);
  document.getElementById("useGpsBtn").addEventListener("click", usePhoneGps);
  document.getElementById("setAttrBtn").addEventListener("click", setAttribute);
  connectionToggleBtn.addEventListener("click", () => {
    const isVisible = connectionCard.style.display !== "none";
    setConnectionVisible(!isVisible);
  });
  connectionCollapseBtn.addEventListener("click", () => {
    setConnectionCollapsed(!connectionBody.classList.contains("hidden"));
  });
  participantSelect.addEventListener("change", refreshPendingActions);

  setConnectionVisible(false);
  setConnectionCollapsed(false);
  refreshParticipants();
</script>
</body>
</html>
